<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Cleaner</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <!-- Header -->
        <h1 id="title"></h1>
        <p id="subtitle"></p>

        <!-- Language -->
        <div class="lang-switcher">
            <select id="lang" onchange="changeLang()">
                <option value="es">🇪🇸 ES</option>
                <option value="en">🇬🇧 EN</option>
            </select>
        </div>

        <!-- Drag & Drop -->
        <div id="drop-area">
            <p id="dropText"></p>
            <input type="file" id="fileInput" hidden>
            <button id="clickOnSelect" onclick="document.getElementById('fileInput').click()"></button>
        </div>

        <!-- File name -->
        <p id="fileName"></p>

        <!-- Preset -->
        <label id="presetLabel"></label>
        <select id="preset">
            <option value="default"></option>
            <option value="podcast"></option>
            <option value="voz"></option>
            <option value="reunion"></option>
        </select>

        <!-- Button -->
        <button id="btn" onclick="upload()"></button>

        <!-- Status -->
        <p id="status"></p>

        <!-- Progress -->
        <div class="progress">
            <div id="progress-bar"></div>
        </div>

        <!-- Result -->
        <div id="result">
            <audio id="audioPlayer" controls></audio>
            <a id="downloadBtn" download="cleaned.mp3">⬇️ Download</a>
        </div>

    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
